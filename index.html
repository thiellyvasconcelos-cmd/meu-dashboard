<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Top Itens por Seller</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e0dfd8;
      --accent: #ff5a1f;
      --text: #1a1a1a;
      --muted: #888880;
      --card: #ffffff;
      --tag-bg: #fff3ee;
      --tag-color: #ff5a1f;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
    }

    header {
      background: var(--text);
      color: #fff;
      padding: 20px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    .logo span { color: var(--accent); }
    .subtitle { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; }

    .main { max-width: 1300px; margin: 0 auto; padding: 40px; }

    .search-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .search-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .search-row { display: flex; gap: 12px; align-items: flex-start; }

    textarea {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 14px 28px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
      height: fit-content;
    }

    .btn:hover { background: #e04a10; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #ccc; cursor: not-allowed; }

    .hint { font-size: 11px; color: var(--muted); margin-top: 8px; }

    .state { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 13px; }
    .state-icon { font-size: 36px; margin-bottom: 12px; }

    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .seller-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 24px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .seller-header {
      background: var(--text);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .seller-id { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; }
    .seller-count { margin-left: auto; font-size: 11px; color: #888; letter-spacing: 1px; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); }

    .tab {
      padding: 12px 20px;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { display: none; padding: 20px 24px; }
    .tab-content.active { display: block; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }

    th {
      text-align: left;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 12px 10px;
      border-bottom: 1px solid var(--border);
    }

    td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--bg); }

    .rank { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 13px; color: var(--muted); width: 32px; }
    .rank-1 { color: #f5a623; }
    .rank-2 { color: #9b9b9b; }
    .rank-3 { color: #c07850; }

    .item-id { font-size: 11px; color: var(--muted); }
    .item-desc { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .qty { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); font-size: 14px; }

    .dim-tag {
      font-size: 10px;
      background: var(--tag-bg);
      color: var(--tag-color);
      padding: 2px 7px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .bar-inline { height: 6px; background: var(--accent); border-radius: 3px; min-width: 4px; }

    .chart-wrap { display: flex; flex-direction: column; gap: 10px; }

    .chart-row { display: flex; align-items: center; gap: 12px; animation: fadeUp 0.3s ease both; }

    .chart-label {
      font-size: 11px;
      color: var(--muted);
      width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .chart-bar-wrap { flex: 1; height: 20px; background: var(--bg); border-radius: 4px; overflow: hidden; }

    .chart-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff8a5a);
      border-radius: 4px;
      transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .chart-val { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; color: var(--text); width: 50px; text-align: right; flex-shrink: 0; }

    .summary {
      display: flex;
      gap: 20px;
      padding: 12px 24px;
      background: var(--bg);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }

    .summary strong { color: var(--text); }

    @media (max-width: 768px) {
      .main { padding: 20px; }
      header { padding: 16px 20px; }
      .search-row { flex-direction: column; }
      .btn { width: 100%; }
      .item-desc { max-width: 160px; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">top<span>items</span></div>
    <div class="subtitle">Top 20 Itens · Últimos 30 dias</div>
  </div>
</header>

<main class="main">

  <div class="search-box">
    <div class="search-label">Sellers IDs</div>
    <div class="search-row">
      <textarea id="sellerInput" placeholder="Cole os IDs dos sellers aqui, separados por vírgula ou linha&#10;Ex: 412008939, 1091041715, 849817033_115314224"></textarea>
      <button class="btn" id="searchBtn" onclick="buscar()">Buscar</button>
    </div>
    <div class="hint">Suporta IDs simples e compostos (ex: 849817033_115314224) · Ctrl+Enter para buscar</div>
  </div>

  <div id="results">
    <div class="state">
      <div class="state-icon">🔍</div>
      Cole os IDs dos sellers acima e clique em Buscar
    </div>
  </div>

</main>

<script>
  async function buscar() {
    const apiUrl = '/api/query';

    const raw = document.getElementById('sellerInput').value.trim();
    if (!raw) { alert('Cole pelo menos um ID de seller.'); return; }

    const ids = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = 'Buscando...';

    document.getElementById('results').innerHTML = `
      <div class="state"><div class="spinner"></div>Consultando BigQuery...</div>`;

    try {
      const resp = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids })
      });
      if (!resp.ok) throw new Error(`Erro HTTP ${resp.status}`);
      const json = await resp.json();
      renderResults(json.data, ids);
    } catch (err) {
      document.getElementById('results').innerHTML = `
        <div class="state"><div class="state-icon">⚠️</div>
        Erro ao consultar a API:<br><small style="color:#cc3300">${err.message}</small></div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Buscar';
    }
  }

  function renderResults(rows, requestedIds) {
    if (!rows || rows.length === 0) {
      document.getElementById('results').innerHTML = `
        <div class="state"><div class="state-icon">📭</div>Nenhum dado encontrado.</div>`;
      return;
    }

    const bySeller = {};
    rows.forEach(r => {
      if (!bySeller[r.SHP_SENDER_ID]) bySeller[r.SHP_SENDER_ID] = [];
      bySeller[r.SHP_SENDER_ID].push(r);
    });

    let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:20px;">
      ${Object.keys(bySeller).length} seller(s) com dados · ${rows.length} itens no total</div>`;

    Object.entries(bySeller).forEach(([sellerId, items], si) => {
      const totalQty = items.reduce((s, i) => s + Number(i.qty_sold || 0), 0);
      const maxQty = Math.max(...items.map(i => Number(i.qty_sold || 0)));

      html += `
        <div class="seller-block" style="animation-delay:${si * 0.06}s">
          <div class="seller-header">
            <div class="seller-id">Seller · ${sellerId}</div>
            <div class="seller-count">${items.length} itens</div>
          </div>
          <div class="tabs" id="tabs-${si}">
            <div class="tab active" onclick="switchTab(${si},'table',this)">Tabela</div>
            <div class="tab" onclick="switchTab(${si},'chart',this)">Gráfico</div>
          </div>
          <div class="tab-content active" id="tab-table-${si}">
            <table>
              <thead><tr>
                <th>#</th><th>Item ID</th><th>Descrição</th>
                <th>Qtd Vendida</th><th>Dimensões</th><th>Tendência</th>
              </tr></thead>
              <tbody>
                ${items.map((item, idx) => {
                  const pct = Math.round((Number(item.qty_sold) / maxQty) * 100);
                  const dim = [item.shp_ite_dimension_max, item.shp_ite_dimension_mid, item.shp_ite_dimension_min]
                    .filter(d => d != null && d !== '').map(d => Number(d).toFixed(1)).join(' × ');
                  return `<tr>
                    <td class="rank rank-${idx+1}">${idx+1}</td>
                    <td class="item-id">${item.item_id || '—'}</td>
                    <td class="item-desc" title="${item.item_desc || ''}">${item.item_desc || '—'}</td>
                    <td class="qty">${Number(item.qty_sold).toLocaleString('pt-BR')}</td>
                    <td>${dim ? `<span class="dim-tag">${dim} cm</span>` : '—'}</td>
                    <td><div class="bar-inline" style="width:${pct}%"></div></td>
                  </tr>`;
                }).join('')}
              </tbody>
            </table>
          </div>
          <div class="tab-content" id="tab-chart-${si}">
            <div class="chart-wrap">
              ${items.slice(0, 10).map((item, idx) => {
                const pct = Math.round((Number(item.qty_sold) / maxQty) * 100);
                const label = item.item_desc || item.item_id || '—';
                return `<div class="chart-row" style="animation-delay:${idx*0.04}s">
                  <div class="chart-label" title="${label}">${idx+1}. ${label}</div>
                  <div class="chart-bar-wrap"><div class="chart-bar" style="width:${pct}%"></div></div>
                  <div class="chart-val">${Number(item.qty_sold).toLocaleString('pt-BR')}</div>
                </div>`;
              }).join('')}
            </div>
          </div>
          <div class="summary">
            <span>Total vendido: <strong>${totalQty.toLocaleString('pt-BR')} unidades</strong></span>
            <span>Top item: <strong>${items[0]?.item_desc || items[0]?.item_id || '—'}</strong></span>
          </div>
        </div>`;
    });

    const semDados = requestedIds.filter(id => !bySeller[id]);
    if (semDados.length > 0) {
      html += `<div style="font-size:12px;color:var(--muted);margin-top:8px;">Sem dados: ${semDados.join(', ')}</div>`;
    }

    document.getElementById('results').innerHTML = html;
  }

  function switchTab(si, tab, el) {
    document.querySelectorAll(`#tabs-${si} .tab`).forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    ['table','chart'].forEach(t => document.getElementById(`tab-${t}-${si}`).classList.remove('active'));
    document.getElementById(`tab-${tab}-${si}`).classList.add('active');
  }

  document.getElementById('sellerInput').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') buscar();
  });
</script>
</body>
</html>
